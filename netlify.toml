[build]
  base = ""
  command = "cd frontend && npm install && npm run build && cd ../backend && npm install"
  publish = "frontend/dist"
  functions = "backend"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
